<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const titleLink = document.querySelector('.site-title');
    if (!titleLink || titleLink.querySelector('img')) return;

    const logo = new Image();
    logo.src = "{{ '/assets/img/logotipo.png' | relative_url }}";
    logo.alt = "Logo";
    logo.className = "site-logo";

    // Solo inserta el logo si existe el archivo. Así evitamos un ícono roto
    // cuando el repositorio todavía no tenga assets/img/logotipo.png.
    logo.onload = () => titleLink.prepend(logo);
  });
</script>

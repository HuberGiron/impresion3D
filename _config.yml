title: Impresión 3D
description: Manual técnico introductorio para FabLab, prototipado y fabricación digital

# GitHub Pages + Just the Docs
remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

lang: es
url: "https://hubergiron.github.io"
baseurl: "/impresion3D"

# Just the Docs
just_the_docs:
  custom_css:
    - "assets/css/custom.css"
  footer_content: ""

# Algunas versiones de Just the Docs leen footer_content a nivel raíz.
# Se mantiene también aquí para evitar que aparezca el pie default del tema.
footer_content: ""

search_enabled: true
search:
  heading_level: 1

heading_anchors: true

aux_links:
  "Repositorio en GitHub":
    - "https://github.com/HuberGiron/impresion3D"

aux_links_new_tab: true
permalink: pretty

exclude:
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "vendor"
